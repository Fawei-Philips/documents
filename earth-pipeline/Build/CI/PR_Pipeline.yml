variables:
  - template: Variables_PR.yml
  - group: "CTWorkspace_Var"

resources:
  repositories:
    - repository: CT_CICD
      type: git
      name: CT_CICD
      ref: refs/heads/master

trigger: none

pool:
  name: $(PoolName)
  demands: "TFSAgentPool -equals CTWS_PR_Build"

name: CTWORKSPACE_${{ Variables.internal_folder_name }}_PR_Build_$(Build.BuildID)

jobs:
  - template: Templates/PR_Gate.yml@CT_CICD
    parameters:
      agentcapability: ${{ Variables.DemandValue }}
      agentDemand: ${{ Variables.DemandName }}
      Version: $(vsVersion)
      ComponentName: ${{ Variables.internal_folder_name }}
      TargetTestFolder: ${{ Variables.target_test_folder }}
      RunModuleTest: "true"
