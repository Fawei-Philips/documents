#CT_Serviceability Variables_ProductBuild.yml
variables:

#Branch Name
  BranchName: 'main'

#Agent variables   
  PoolName: 'CT_CN_WorkSpace_Product'
  DemandName: 'TFSAgentPool'
  DemandValue: 'CT_WS_ProductBuild'
  ADSURL: 'https://tfsemea1.ta.philips.com/tfs/'
  artifactoryService: 'JfrogArtifactory'


#Nuget cheking,creating and packaging variables    
  artifactory_base_url: 'https://artifactory-china.ta.philips.com:443/artifactory'
  validate_artifactory_base_url: 'https://artifactory-china.ta.philips.com:443/artifactory/api/storage'
  upload_base_url: 'https://artifactory-china.ta.philips.com:443/artifactory/api/nuget'
  artifactory_reponame: 'ct-workspace'
  artifactory_reponame_debug: 'ct-dev-workspace-generic'
  internal_folder_name: 'CT_Serviceability'
  component_name: 'CT_ServiceabilityInf'
  component_name2: 'CT_ServiceabilityImpl'
  component_name3: 'CT_ServiceabilityPostActions'
  component_name4: 'CT_ServiceabilityTest'
  state: 'CT_ServiceabilityInf'
  state2: 'CT_ServiceabilityImpl'
  state3: 'CT_ServiceabilityPostActions'
  state4: 'CT_ServiceabilityTest'

  nuspec_source_path: '$(build.sourcesdirectory)/Build/Pkg/Nuget/CT_ServiceabilityInf.nuspec'
  nuspec_source_path2: '$(build.sourcesdirectory)/Build/Pkg/Nuget/CT_ServiceabilityImpl.nuspec'
  nuspec_source_path3: '$(build.sourcesdirectory)/Build/Pkg/Nuget/CT_ServiceabilityPostActions.nuspec'
  nuspec_source_path4: '$(build.sourcesdirectory)/Build/Pkg/Nuget/CT_ServiceabilityTest.nuspec'
  nupkg_source_path: '$(Build.ArtifactStagingDirectory)/$(state)'
  nupkg_source_path2: '$(Build.ArtifactStagingDirectory)/$(state2)'
  nupkg_source_path3: '$(Build.ArtifactStagingDirectory)/$(state3)'
  nupkg_source_path4: '$(Build.ArtifactStagingDirectory)/$(state4)'
  nuspec_checker_script_path: 'Build/CI/Pipeline_Scripts/FullBuild_Scripts/nuspec_checker.ps1'
  nuget_uploader_script_path: 'Build/CI/Pipeline_Scripts/FullBuild_Scripts/nuget_uploader.ps1'


  
#Solution paths.
  MSBuildEngine: 'C:\VS2022\MSBuild\Current\Bin\MSBuild.exe'
  SolutionPath: '*.sln'
  ComponentName: 'CT_Serviceability'
  ArtifactoryRepoName: 'ct-workspace'
  3rdPartyPackagesPath: '$(build.sourcesdirectory)\Dependencies\Ref'
  Maxtestfailureattempt: '3'
  Maxtestfailedforrerun: '5'
  Testdllpath: 'Source\**\Tst\**\bin\Release\*.Test.dll'
  target_test_folder: 'D:\PCC\ChorusHost\Bin'

#Solution paths
  InterfacesPath: 'ExtInf/CT_ServiceabilityInf.sln'
  ServicesPath: 'Src/CT_ServiceabilityImpl.sln'



#BUSpecific Variables 														 
  platform: 'Any Cpu'
  configuration: 'Release'  
  debug_configuration: 'Debug'
  warningThreshold: '2'
  GatedBuild: 'false'
  UpdateCapability: '$(build.sourcesdirectory)\Build\Pipeline_Scripts\UpdateCapability.ps1'
  TestAdapterPath: 'Ref\NUnit3TestAdapter\3.10.0\build\net35'
  vsVersion: '15.0'
  