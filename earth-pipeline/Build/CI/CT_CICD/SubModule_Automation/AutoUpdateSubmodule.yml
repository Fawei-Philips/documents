trigger: none
variables: 
  - group: 'CTWorkspace_Var'
  - name: TFS_AUTH
    value: $[variables.PAT_ing07471]
  - name: CONFIG_FILE_PATH 
    value: $(ConfigFilePath)

pool: 
    name: 'CT-WS1'
    demands: 'TFSAgentPool -equals MainConsole_Hawk641'
stages:
  - stage: update
    displayName: Update Submodule
    jobs: 
      - job: checkout
        workspace:
            clean: all
        timeoutInMinutes: 0    
        displayName: Update Submodule
        steps:
        - checkout: self
          clean: true
        - task: PowerShell@2
          continueOnError: False
          displayName: Updating Submodules
          inputs:
            filePath: '$(Build.SourcesDirectory)/SubModule_Automation/update_submodule_parallel.ps1'
            arguments: '"$(CONFIG_FILE_PATH)" "$(TFS_AUTH)" "$(Agent.BuildDirectory)"'
            failOnStderr: true


        - task: PowerShell@2
          displayName: 'Copy cleanup script to temp'
          inputs:
            targetType: inline
            script: |
                Copy-Item "$(Build.SourcesDirectory)\scripts\workspace_cleanup.ps1" "$(Agent.TempDirectory)\workspace_cleanup.ps1"
          condition: always()
        
        - task: PowerShell@2
          displayName: 'Work Space Cleanup'
          inputs:
            targetType: filePath
            filePath: $(Agent.TempDirectory)\workspace_cleanup.ps1
            arguments:  '-Paths "$(Agent.BuildDirectory)"'
            failOnStderr: true
            workingDirectory: $(Agent.TempDirectory)
          condition: always()