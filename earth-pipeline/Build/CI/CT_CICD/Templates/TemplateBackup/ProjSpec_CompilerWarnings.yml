parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:
- job: ProjSpec_CompilerWarnings
  condition: and(succeeded(), eq(variables['ProjSpec_CompilerWarnings'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: CmdLine@1
    displayName: 'Gate: Build Quality check'
    inputs:
     filename: '"$(EGS.filename)" '
     arguments: '$(EGS.MainDll) $(EGS.Config) -p $(System.PullRequest.PullRequestId) -d -gateon cwcheck -biu $(EGS.BIU) -buildid $(Build.BuildId)'
    enabled: 'true'
