parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Version: ''

jobs:
- job: Env_Test_Cabinet_Package_Generation
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: PowerShell@2
    inputs:
       filePath: '$(collect_All_Binaries_script_path)'
       arguments: '$(Build.ArtifactStagingDirectory) $(Build.SourcesDirectory) $(EnvCabinateinput) "Env"' 
       ignoreLASTEXITCODE: true  
    displayName: 'Collect binaries for ENV cabinate file' 

  - task: PowerShell@2
    inputs:
       filePath: '$(generate_cab_script_path)'
       arguments: '$(Build.ArtifactStagingDirectory)/$(EnvCabinateinput) $(Build.BuildID) $(Build.SourceBranch)'   
    displayName: 'Generate Env Cabinet File'  

  - task: PowerShell@2
    inputs:
       filePath: '$(collect_All_Binaries_script_path)'
       arguments: '$(Build.ArtifactStagingDirectory) $(Build.SourcesDirectory) $(TestCabinateinput) "Test"' 
       ignoreLASTEXITCODE: true 
    displayName: 'Collect binaries for TEST cabinate file' 

  - task: PowerShell@2
    inputs:
       filePath: '$(generate_cab_script_path)'
       arguments: '$(Build.ArtifactStagingDirectory)/$(TestCabinateinput) $(Build.BuildID) $(Build.SourceBranch)'   
    displayName: 'Generate TEST Cabinet File'  

  - task: ArtifactoryNuGet@2
    inputs:    
      command: 'push'
      artifactoryService: '$(artifactoryService)'
      targetDeployRepo: '$(EnvPackagesDeployRepo)'
      pathToNupkg: '$(Build.ArtifactStagingDirectory)/$(pathToEnvCabFile)'
      collectBuildInfo: true
      buildName: '$(Build.DefinitionName)'
      buildNumber: '$(Build.BuildNumber)'
    continueOnError: false
    displayName: Publish Env Cab File

  - task: ArtifactoryNuGet@2
    inputs:    
      command: 'push'
      artifactoryService: '$(artifactoryService)'
      targetDeployRepo: '$(TestPackagesDeployRepo)'
      pathToNupkg: '$(Build.ArtifactStagingDirectory)/$(pathToTestCabFile)'
      collectBuildInfo: true
      buildName: '$(Build.DefinitionName)'
      buildNumber: '$(Build.BuildNumber)'
    continueOnError: false
    displayName: Publish Test Cab File