parameters:
 dependsOn: []
 agentDemand: []
 agentcapability: []
 Solution: []
 
jobs:
- job: Build_CI
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: PowerShell@1
    displayName: 'Update Assembly and File Version'
    inputs:
      scriptName: $(DINxGenHostBuild)
      arguments: '$(Build.BuildId) $(Build.SourcesDirectory) $(GatedBuild)' 

  - ${{ each sln in parameters.Solution }}:
    - task: VSBuild@1
      displayName: 'Build solution: ${{ sln.solutionname }}'
      inputs:
        solution: ${{ sln.solutionPath }}
        vsVersion: '$(vsVersion)'
        platform: $(platform)
        configuration: $(configuration)
        clean: true
      enabled: 'true'
      condition: and(succeededOrFailed(), eq(variables['VSbuild'], 'true'))

  - task: BuildQualityChecks@8
    displayName: 'Gate: Warning Check'
    inputs:
     checkWarnings: true
     warningFailOption: 'fixed'
     warningThreshold: $(warningThreshold)
    enabled: 'true'