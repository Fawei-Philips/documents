parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  inputs : []
  Checkout : []
  ticccspass: []
  

jobs:
- job: TICS
  dependsOn: ${{ parameters.dependsOn }}
  timeoutInMinutes: 0
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout:  ${{ parameters.Checkout }}

  
 # - ${{ each i in parameters.inputs }}:
  #   - script: |
   #      python build/get_pac.py
     #    python pac_libraries/set_pac.py
     #    python pac_libraries/master_libs/tics/tics.py --json_file=${{ i.path }}
     #  displayName: 'Run tics devops lib'
     #  enabled: true 


  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools'
    failOnStderr: true

  - script: |
          set TICS=$(TICSURL)
          set TICSAUTHTOKEN=$(TICSAUTHTOKEN)
          set PATH=%PATH%;C:\Users\ing07471\AppData\Roaming\TICS\Wrapper\BuildServer
          echo ${{ parameters.ticccspass }}
          dotnet $(EGSbin)\gates_main.dll $(EGSconfigs)\conf\sample-configuration\mainConfig.json -biu $(EGSbiu) -p $(System.PullRequest.PullRequestID) -d -w $(Build.SourcesDirectory) -gateon tics_cs,tics_dc 
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Run EGS Tics Filewise' 
     
      

  
