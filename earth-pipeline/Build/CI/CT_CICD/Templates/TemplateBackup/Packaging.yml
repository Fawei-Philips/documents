parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Argumentx64: []
  Argumentx86: []

jobs:  
- job: Packaging
  timeoutInMinutes: 0
  dependsOn: ${{ parameters.dependsOn }}
  condition: and(succeeded(), eq(variables['Packaging'], 'true'))
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}	
  steps:
  - checkout: none
  - task: PowerShell@2
    displayName: 'Philips.DI.UWF.Stubs Installer '
    inputs:
     targetType: filePath
     filePath: './$(MSI_Generation)'
     arguments: '$(Build.BuildId) $(build.sourcesdirectory) Philips.DI.UWF.Stubs_Installer $(NightlyBuildShare)\$(Build.BuildID)'

  - task: PowerShell@1
    displayName: 'Build X64 Solution'
    inputs:
     scriptName: '$(MSBuildScript)'
     arguments: '$(build.sourcesdirectory) $(configuration) $(Release64) "true" "$(MSBuild15)"'

  - ${{ each s in parameters.Argumentx64 }}:
    - task: PowerShell@2
      displayName: '${{ s }}'
      inputs:
        targetType: filePath
        filePath: './$(MSI_Generation)'
        arguments: '$(Build.BuildId) $(build.sourcesdirectory) ${{ s }} $(NightlyBuildShare)\$(Build.BuildID)'

  - task: PowerShell@1
    displayName: 'Build x86 Solution '
    inputs:
     scriptName: '$(MSBuildScript)'
     arguments: '$(build.sourcesdirectory) $(configuration) $(Release86) "true" "$(MSBuild15)"'

  - ${{ each s in parameters.Argumentx86 }}:
    - task: PowerShell@2
      displayName: '${{ s }}'
      inputs:
        targetType: filePath
        filePath: './$(MSI_Generation)'
        arguments: '$(Build.BuildId) $(build.sourcesdirectory) ${{ s }} $(NightlyBuildShare)\$(Build.BuildID)'

  - task: PowerShell@2
    displayName: 'Satellite Assemblies Generation Services'
    inputs:
     targetType: filePath
     filePath: '$(Localizationscript)'
     arguments: '"$(Build.SourcesDirectory)\Sources\Services" $(Build.SourcesDirectory) "$(Build.SourcesDirectory)\Build\Pipeline_Scripts\Satellite_Assemblies_Languages_List.txt" "$(ResgenandAlexepath)" "$(SatelliteAssembliesVersion)" "$(Build.SourcesDirectory)\Build\di_key.snk"'
 
  - task: PowerShell@2
    displayName: 'Satellite Assemblies MSI Services '
    inputs:
     targetType: filePath
     filePath: '$(MSI_Generation)'
     arguments: '$(Build.BuildId) $(Build.SourcesDirectory) "Philips.DI.Services.Resources" $(NightlyBuildShare)\$(Build.BuildID)'
  
  - task: PowerShell@2
    displayName: 'Satellite Assemblies Generation UWF'
    inputs:
     targetType: filePath
     filePath: '$(Localizationscript)'
     arguments: '"$(Build.SourcesDirectory)\Sources\UserWorkflow" $(Build.SourcesDirectory) "$(Build.SourcesDirectory)\Build\Pipeline_Scripts\Satellite_Assemblies_Languages_List.txt" "$(ResgenandAlexepath)" "$(SatelliteAssembliesVersion)" "$(Build.SourcesDirectory)\Build\di_key.snk"'
 
  - task: PowerShell@2
    displayName: 'Satellite Assemblies MSI UWF'
    inputs:
     targetType: filePath
     filePath: '$(MSI_Generation)'
     arguments: '$(Build.BuildId) $(Build.SourcesDirectory) "Philips.DI.UWF.Resources" $(NightlyBuildShare)\$(Build.BuildID)'

  - task: PowerShell@2
    inputs:
        filePath: '$(ZipMSIs)'
        arguments: $(Build.BuildId) $(Build.StagingDirectory) "$(MSISharePath)"
    continueOnError: true
    displayName: ZipPackages

  - task: ArtifactoryNuGet@2
    inputs:
      command: 'push'
      artifactoryService: '$(artifactoryService)'
      targetDeployRepo: '$(PackagesDeployRepo)'
      pathToNupkg: '$(pathToNupkg)'
      collectBuildInfo: true
      buildName: '$(Build.DefinitionName)'
      buildNumber: '$(Build.BuildNumber)'
    continueOnError: true
    displayName: PublishPackages