parameters:
  Solutionpath: []
  dependsOn: []
  agentcapability: []
  Capabilityname: []
  agentDemand: [] 
 
jobs:
- job: Angular_Cab_Generation
  timeoutInMinutes: 0
  condition: and(succeeded(), eq(variables['Angular_Cab_Generation'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  variables:
    sourcesdirectory: $(build.sourcesdirectory)
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: PowerShell@2
    inputs:
       filePath: '$(collect_NPM_Binaries_script_path)'
       arguments: '$(Angular_Projects_Dist_Path) $(NPM_Cabinateinput)' 
       ignoreLASTEXITCODE: true  
    displayName: 'NPM_binaries_collection_for_cabinate_file' 

  - task: PowerShell@2
    inputs:
       filePath: '$(generate_cab_script_path)'
       arguments: '$(NPM_Cabinateinput) $(Build.BuildID) $(Build.SourceBranchName)'   
    displayName: 'NPM_Cab_File_Generation'  
   
  - task: ArtifactoryNuGet@2
    inputs:    
      command: 'push'
      artifactoryService: '$(artifactoryService)'
      targetDeployRepo: '$(NPMPackagesDeployRepo)'
      pathToNupkg: '$(pathToNPMCabFile)'
      collectBuildInfo: false
      buildName: '$(Build.DefinitionName)'
      buildNumber: '$(Build.BuildNumber)'
    continueOnError: false
    displayName: Publish_NPM_Cab_File
