parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  gateName: []
  projectName: []
  TICS_ABS_Count_Gates_arg: []
 
jobs:
- job: TICS_Quality_Gates
  dependsOn: ${{ parameters.dependsOn }}
  condition: and(succeeded(), eq(variables['Tics_Gates'], 'true'))
  timeoutInMinutes: 0
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - ${{ each s in parameters.gateName }}:
    - task: CmdLine@2
      displayName: '${{ s.gateDisplayName }}'
      continueOnError: true
      condition: succeededOrFailed()
      inputs:
        script: dotnet $(Gates_DLL_Path) -nightly $(Nightly_Config_Json_Path) -biu DI -program DI -d -n ${{ parameters.projectName }} -gateon ${{ s.gateValue }}
      enabled: 'true'

  - ${{ each s in parameters.TICS_ABS_Count_Gates_arg }}:
      - task: PowerShell@2
        displayName: '${{ s }}-ABS_count_gates'
        inputs:
          targetType: filePath
          filePath: '$(TICSABSCountGates)'
          arguments: '${{ s }} $(Build.SourcesDirectory)'
        continueOnError: true
        condition: succeededOrFailed()      
      