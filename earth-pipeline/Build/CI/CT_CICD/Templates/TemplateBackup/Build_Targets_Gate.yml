parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:

- job: Build_Targets_Gate
  condition: and(succeeded(), eq(variables['Build_Targets_Gate'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}

  steps:
  - checkout: none

  - task: PowerShell@2
    displayName: 'Build_Targets_Gate'
    continueOnError: false
    inputs:
     targetType: filePath
     filePath: '$(Build.SourcesDirectory)/Build/Pipeline_Scripts/PR_Scripts/Build_Targets_Gate.ps1'
     arguments: '$(Build.SourcesDirectory)'
    enabled: 'true'

  - task: PowerShell@2
    displayName: 'Direct_DllReference_Gate'
    continueOnError: false
    inputs:
     targetType: filePath
     filePath: '$(Build.SourcesDirectory)/Build/Pipeline_Scripts/PR_Scripts/Direct_DllReference_Gate.ps1'
     arguments: '$(Build.SourcesDirectory)'
    enabled: 'true'