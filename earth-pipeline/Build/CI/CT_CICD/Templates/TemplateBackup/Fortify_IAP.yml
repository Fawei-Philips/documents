parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Checkout: []
  SolutionPathAndVersionName: []

jobs:
- job: Fortify
  dependsOn: ${{ parameters.dependsOn }}
  timeoutInMinutes: 0
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: ${{ parameters.Checkout }}  
  - ${{ each sv in parameters.SolutionPathAndVersionName }}:
    - task: PowerShell@2
      inputs:
        filePath: '$(Fortify_Analysis_Script)'
        arguments: '$(build.sourcesdirectory) "$(Fortifysourceanalyzer)" "$(MSBuild15)" "$(FortifyRpt)" $(Build.BuildId) $(fortify_token) $(FortifApplicationName) ${{ sv.solutionPath }} ${{ sv.fortifyVersionName }}'
      displayName: 'Fortify Analysis'