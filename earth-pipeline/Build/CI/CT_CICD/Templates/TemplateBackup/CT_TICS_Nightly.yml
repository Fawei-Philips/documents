parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Checkout : []

jobs:
- job: TICS_Integration
  condition: and(succeeded(), eq(variables['CT_TICS_Nightly'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  timeoutInMinutes: 0
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: ${{ parameters.Checkout }}
  - script: 'mkdir $(build.artifactstagingdirectory)\TICS'
#      - script: |
#              set TICS=https://tics-pic.ta.philips.com/tiobeweb/CT/api/cfg?name=WINDOWS
#              set PATH=%PATH%;C:\Program Files (x86)\TIOBE\TICS\BuildServer
#              \\ingbtcpic5vw092\TICSFS\wrappers\windows\BuildServer\TICSQServer_parallel.bat -project $(TicsProject) -config Release -nosanity -tmpdir D:\TicsTemp1
#        workingDirectory: '$(Build.SourcesDirectory)'
#        failOnStderr: false
#        displayName: 'TICS Parallel' 
#        enabled: true

  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools'
    failOnStderr: true

  - script: |
          set TICS=$(TICSURL)
          set TICSAUTHTOKEN=$(TICSAUTHTOKEN)
          set PATH=%PATH%;C:\Users\ing07471\AppData\Roaming\TICS\Wrapper\BuildServer
          ticsmaintenance -project $(ApplicationVersion) -detach
          TICSQServer.exe -tmpdir C:\temp\tics\$(ApplicationVersion) -project $(ApplicationVersion) -branchdir $(Build.SourcesDirectory)
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: true
    displayName: 'TICS Run'   

