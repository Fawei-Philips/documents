parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:

- job: Build_Props_Gate
  condition: and(succeeded(), eq(variables['Build_Props_Gate'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}

  steps:
  - checkout: none

  - task: PowerShell@2
    inputs:
      filePath: Build/Pipeline_Scripts/PullrequestFiles.ps1   
      arguments: '$(System.PullRequest.PullRequestId) "$(ReposID)" "$(ProjectURL)" $(build.sourcesdirectory)'
    displayName: 'PR_files' 
    enabled: 'true'
    
  - task: PowerShell@2
    displayName: 'Build_Props_Gate'
    inputs:
     targetType: filePath
     filePath: '$(Build.SourcesDirectory)/Build/Pipeline_Scripts/PR_Scripts/Build_Props_Gate.ps1'
     arguments: '$(Build.SourcesDirectory) $(System.PullRequest.PullRequestId)'
    enabled: 'true'