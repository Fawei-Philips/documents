parameters:
  Solutionpath: []
  dependsOn: []
  agentcapability: []
  Capabilityname: []
  agentDemand: [] 
 
jobs:
- job: ComponentTests_Run
  timeoutInMinutes: 0
  condition: and(succeeded(), eq(variables['ComponentTests_Run'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  variables:
    sourcesdirectory: $(build.sourcesdirectory)
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: VisualStudioTestPlatformInstaller@1
    displayName: 'Visual Studio Test Platform Installer'
    inputs:
     versionSelector: specificVersion
     testPlatformVersion: $(testPlatformVersion)
    continueOnError: true
    # condition: and(succeededOrFailed(), eq(variables['var.AMRun'], 'true'))
    enabled: 'true'
  
  - task: VSTest@2
    displayName: 'Test plan'
    inputs:
     testSelector: testPlan
     testPlan: $(TestPlanID)
     testSuite: $(TestSuitIDs)
     testConfiguration: $(testConfiguration)
     searchFolder: '$(sourcesdirectory)'
     vsTestVersion: '$(vsVersion)'
     pathtoCustomTestAdapters: $(CustomTestAdapterpath)
     codeCoverageEnabled: false
    