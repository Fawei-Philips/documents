parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  inputs : []
  checkout : []

jobs:
- job: Blackduck
  dependsOn: ${{ parameters.dependsOn }}
  timeoutInMinutes: 0
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: ${{ parameters.checkout }}
  - task: PythonScript@0
    displayName: Print_Env
    inputs:
        scriptSource: 'inline'
        script: |
          import os
          import sys
          dont_print = ['coverity_user','coverity_password','artifactory_user','artifactory_token','blackduck_token','ads_token','fortify_token','sonar_login']
          for k, v in sorted(os.environ.items()):
              if k.rstrip() not in dont_print:
                  env = k+' = '+ v
                  path = os.environ.get('BUILD_SOURCESDIRECTORY')
                  file = open(path+'/build/pac_buildinfo.txt', 'a')
                  sys.stdout = file
                  print(env)
                  file.close()        
          #print ('##vso[task.addattachment type=Distributedtask.Core.Summary;name=Environment Variables;]env') 
        ##pythonInterpreter: '/usr/bin/python3.9'
  - ${{ each i in parameters.inputs }}:
    - script: |
        python build/get_pac.py
        python pac_libraries/set_pac.py
        python pac_libraries/master_libs/blackduck/blackduck.py --json_file=${{ i.path }} --blackduck_token $(blackduck_token)
      displayName: 'Run Blackduck devops lib'
      enabled: true  
      

  
