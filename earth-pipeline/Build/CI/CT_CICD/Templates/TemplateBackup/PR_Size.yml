parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:
- job: PR_Size
  condition: and(succeeded(), eq(variables['PR_Size'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  
  - task: PowerShell@2
    displayName: 'Gate: SetVariable PRSize'
    inputs:
     targetType: filePath
     filePath: '$(SetVariablePRSize)'
     arguments: $(PAT) $(System.PullRequest.PullRequestId) $(PRSizeCode) $(ReposID)
    enabled: 'true'

  - task: CmdLine@1
    displayName: 'Gate: PRSize'
    inputs:
     filename: '"$(EGS.filename)"'
     arguments: '$(EGS.MainDll) $(EGS.Config) -p $(System.PullRequest.PullRequestId) -gateon prfilesize -biu $(EGS.BIU) -w $(Build.sourcesdirectory) -d '  
    enabled: 'true'
    condition: and(succeeded(), eq(variables['var.PRSize'], 'true'))