parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:
- job: Unit_Testing
  condition: and(succeeded(), eq(variables['Unit_Testing'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  timeoutInMinutes: 0
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: VSTest@2
    displayName: 'Unit Test: $(ComponentName)'
    inputs:
     testAssemblyVer2: $(Testdllpath)
     searchFolder: '$(build.SourcesDirectory)'
     runOnlyImpactedTests: false
     vsTestVersion: '$(vsVersion)'
     pathtoCustomTestAdapters: '$(CustomTestAdapterpath)'
     codeCoverageEnabled: false
     publishRunAttachments: false
     rerunFailedTests: true
     rerunType: basedOnTestFailureCount
     rerunFailedTestCasesMaxLimit: $(Maxtestfailedforrerun)
     rerunMaxAttempts: $(Maxtestfailureattempt)     
    enabled: 'true'

