parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Version: ''
  ComponentName: ''
  csproj: []

jobs:
- job: Resharper
  workspace:
    clean: all
  timeoutInMinutes: 0
  condition: and(succeeded(), eq(variables['CT_Resharper_Nightly'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: self
    submodules: true

  - ${{ each sln in parameters.Solution }}:
      - task: ArtifactoryNuGet@1
        condition: and(succeeded(),eq(variables['dotnetcore'],''))
        displayName: 'Restore: ${{ sln.solutionname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - ${{ each proj in parameters.csproj }}:
      - task: ArtifactoryNuGet@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Nuget Restore: ${{ proj.cname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ proj.cPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - ${{ each sln in parameters.Solution }}:
      - task: ArtifactoryDotnetCore@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Dotnet Restore: ${{ sln.solutionname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          noNuGetCache: true
          rootPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools_Dev'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools_Dev/Tools_Dev.$(Tools_Dev_version).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools_Dev -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools_Dev'
    failOnStderr: true

  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools'
    failOnStderr: true

  - task: bleddynrichards.Assembly-Info-Task.Assembly-Info-Task.Assembly-Info-NetFramework@2
    displayName: ' File Versioning '
    inputs:
      FileNames: | 
       **\AssemblyInfo.cs
      Title: ${{ parameters.ComponentName }}
      Product: ${{ parameters.ComponentName }}
      Company: Philips
      VersionNumber: 1.0.0.0
      FileVersionNumber: 1.0.0.0
      InformationalVersion: 1.0.0.0'
      Copyright: 2023
    enabled: 'True'

  # - task: CopyFiles@2
  #   displayName: 'Copy File Directory.Build.props'
  #   inputs:
  #    SourceFolder: '$(build.sourcesdirectory)\Build\CI\Pipeline_Scripts'
  #    Contents: Directory.Build.props
  #    TargetFolder: '$(build.sourcesdirectory)'
  #    OverWrite: true
  #    continueOnError: true

  - task: MSBuild@1
    displayName: 'Build solution: ${{ parameters.ComponentName }}Inf.sln'
    condition: and(succeeded(), eq(variables['custom_build'], ''))
    inputs:
     solution: ExtInf/$(SolutionPath)
     msbuildLocationMethod: location
     msbuildLocation: 'C:\Program Files\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe'
     platform: $(platform)
     configuration: $(configuration)
     clean: false
    enabled: 'true'

  - task: MSBuild@1
    displayName: 'Build solution: ${{ parameters.ComponentName }}Impl.sln'
    condition: and(succeeded(), eq(variables['custom_build'], ''))
    inputs:
     solution: Src/$(SolutionPath)
     msbuildLocationMethod: location
     msbuildLocation: 'C:\Program Files\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe'
     platform: $(platform)
     configuration: $(configuration)
     clean: false
    enabled: 'true'

  - task: PowerShell@2
    displayName: "Custom Build"
    name: "custom_build"
    condition: ne(variables['custom_build'], '')
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Triggering custom build: $env:CUSTOM_BUILD"
        $scriptPath = "$env:BUILD_SOURCESDIRECTORY\$env:CUSTOM_BUILD"
        Invoke-Expression $scriptPath
      failOnStderr: true
      workingDirectory: "$(Build.SourcesDirectory)"

  - script: |
        $(Proxy_http)   
    workingDirectory: $(Package_json_path)
    displayName: 'Set proxy'
    condition: eq(variables['Set_http_Proxy'], 'true')
    enabled: 'true'

  - script: |
      $(Proxy_https)    
    workingDirectory: $(Package_json_path)
    displayName: 'Set proxy'
    condition: eq(variables['Set_https_Proxy'], 'true')
    enabled: 'true'
           
  - task: CmdLine@2  
    inputs:
      script: $(NPMRegistry)
      workingDirectory: $(Package_json_path)
    displayName: 'Set NPM registry'
    condition: eq(variables['Set_NPM_registry'], 'true')
    enabled: 'true'
    
  - task: PowerShell@2
    displayName: 'set multiple registry'
    inputs:
       targetType: filePath
       filePath: './Build/CI/CT_CICD/scripts/Angular/NpmRegistryset.ps1'
       arguments: '$(Build.SourcesDirectory)'
       failOnStderr: true
       workingDirectory: '$(Build.SourcesDirectory)/Build/CI/CT_CICD/scripts/Angular'  
    condition: eq(variables['Set_multiNPM_registry'], 'true')
    enabled: 'true'
    
  - task: CmdLine@2  
    inputs:
      script: npm install --force
      workingDirectory: $(Package_json_path)
    displayName: 'install NPM Package'
    condition: eq(variables['Install_NPM_Package'], 'true')
    enabled: 'true'
    continueOnError: false

  - script: |
      $(Remove_Proxy_http)
    workingDirectory: $(Package_json_path)
    displayName: 'Remove Proxy' 
    condition: eq(variables['Remove_http_Proxy'], 'true')
    enabled: 'true' 

  - script: |
      $(Remove_Proxy_https)  
    workingDirectory: $(Package_json_path)
    displayName: 'Remove Proxy' 
    condition: eq(variables['Remove_https_Proxy'], 'true')
    enabled: 'true' 

  - task: CmdLine@2
    displayName: 'Build_NPM_Modules'
    inputs:
       script: powershell.exe $(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\Angular\NPM_Build.ps1 $(Angular_Projects_Path)
       workingDirectory: '$(Build.SourcesDirectory)/Build/CI/CT_CICD/scripts/Angular' 
    condition: eq(variables['Build_NPM_Modules'], 'true')
    enabled: 'true'
    continueOnError: false
    
  - task: PowerShell@2
    displayName: 'unset multiple registry'
    inputs:
       targetType: filePath
       filePath: './Build/CI/CT_CICD/scripts/Angular/NpmRegistryremove.ps1'
       arguments: '$(Build.SourcesDirectory)'
       failOnStderr: true
       workingDirectory: '$(Build.SourcesDirectory)/Build/CI/CT_CICD/scripts/Angular'  
    condition: eq(variables['UnSet_multiNPM_registry'], 'true')
    enabled: 'true'

  - script: 'dotnet $(Build.SourcesDirectory)\Tools\Tools.$(Toolsversion)\EGS\gates_main.dll $(Build.SourcesDirectory)\Build\CI\EGSconfigs\conf\sample-configuration\mainConfig.json -biu $(EGSbiu) -d -fullresharperscan -build $(Build.BuildNumber) -passgates yes -repotoken $(EGSToken)'
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: true
    displayName: 'Run EGS Resharper'

  - task: CdiscountAlm.rest-call-build-task.custom-build-task.restCallBuildTask@0
    inputs:
      webserviceEndpoint: RESTAPI
      httpVerb: 'POST'
      body: |
          {
          "_id":"$(Build.BuildNumber)",
          "_BuildName":"$(Build.DefinitionName)",
          "_PipelineType":"$(Build.DefinitionName)",
          "_RequestedBy":"$(Build.QueuedBy)",
          "_RequestedOn":null,
          "_QueuedAt":null,
          "_StartedAt":null,
          "_SourceVersion":"$(Build.SourceVersion)",
          "_OverallSummary":"https://tfsemea1.ta.philips.com/tfs/TPC_Region26/CT-GlobalSW/_build/index?buildId=$(Build.BuildID)&_a=summary",
          "_DevelopersContributed":["Null", "Null"],
          "_WhoFailed":["$(Build.QueuedBy)", "Null"],
                         "_AgentInfo":{
                                   "_AgentId":"$(Agent.Id)",
                                   "_AgentName":"$(Agent.Name)",
                                   "_AgentMachineName":"$(Agent.MachineName)",
                                   "_Status":"Active",
                                   "_ServiceAccount":"code1/ing07471",
                                   "_QueErr_Info":"null"
                         },
                         "_Steps":{
                                 "_SequenceId":null,
                                 "_StepName":null,
                                 "_Status":null,
                                 "_BriefInfo":null,
                                 "_StepDetailedInfo":{
                                 }
                         }
          }
      saveResponseToFile: true
      outputFilePath: '$(Build.ArtifactStagingDirectory)\apioutini.txt'
    condition: always()

  - task: PostBuildCleanup@3
    displayName: 'Post-Build Cleanup'
    inputs:
      rootFolderOrFile: $directories.split('_')
      cleanSources: true
    condition: always()