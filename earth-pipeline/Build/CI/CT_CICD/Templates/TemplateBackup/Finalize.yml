parameters:
  agentDemand: []
  agentcapability: []

jobs:
- job: Finalize
  condition: and(always(), eq(variables['Finalize'], 'true'))
  dependsOn:  ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: PowerShell@2
    timeoutInMinutes: 0
    inputs:
        filePath: $(UpdateCapability) 
        arguments: $(PoolID) $(Agent.Id) "$(ADSURL)" "true" "$(TFS_PAT)" ${{ parameters.agentDemand }}