jobs:
  - job: checkout
    variables:
      newVersion: $[ stageDependencies.Versioning.Versioning.outputs['bump_version.Version'] ]
    workspace:
      clean: all
    displayName: Create and merge PR
    pool:
      name: "$(PoolName)"
      demands:
        - ${{ 'TFSAgentPool' }} -equals ${{ 'MainConsole_Hawk641' }}
    steps:
      - checkout: self
        submodules: true
        clean: true
      - task: PowerShell@2
        continueOnError: False
        displayName: Create and merge PR
        inputs:
          filePath: '$(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\create_merge_pr.ps1'
          arguments: '-Region "TPC_Region26" -Project "CT-GlobalSW" -Repo "$(Build.Repository.Name)" -Source "TestBranch" -Target "versioning-test-new" -Title "Update changes" -Auth "$(TFS_PAT)"'
          failOnStderr: true
      - powershell: |
          Write-Host $(newVersion)
          git pull origin versioning-test-new
          git tag $(newVersion)
          git push origin $(newVersion)
        displayName: ManualTag
