parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:
- job: Set_Variable_PR_Size
  condition: and(succeeded(), eq(variables['PRSizeVariableBypass'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: PowerShell@2
    displayName: 'Gate: SetVariable PRSize'
    inputs:
     targetType: filePath
     filePath: '$(SetVariablePRSize)'
     arguments: $(PAT) $(System.PullRequest.PullRequestId) $(PRSizeCode)
    enabled: 'true'
