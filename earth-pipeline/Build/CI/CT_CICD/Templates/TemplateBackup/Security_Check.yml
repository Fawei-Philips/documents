jobs:
- job: Security_Check
  condition: and(succeeded(), eq(variables['Security_Check'], 'true'))
  dependsOn: Build
  pool:
    name:  '$(PoolName)'
    demands:
    - pdp -equals $(DemandValue)
  steps:
  - checkout: none
  - task: CmdLine@2
    displayName: SecurityCheck
    inputs:
     script: 'echo SecurityCheck'
