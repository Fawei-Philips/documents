parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Version: ''
  ComponentName: ''
  Solution: []
  csproj: []

jobs:
- job: CT_CyclomaticComplexity_Nightly
  workspace:
    clean: all
  timeoutInMinutes: 0
  condition: and(succeeded(), eq(variables['CyclomaticComplexity'], 'true'))
  dependsOn: ${{ parameters.dependsOn }} 
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: self
    clean: true
    fetchDepth: 2  
  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools'

  - ${{ each sln in parameters.Solution }}:
      - task: ArtifactoryNuGet@1
        condition: and(succeeded(),eq(variables['dotnetcore'],''))
        displayName: 'Restore: ${{ sln.solutionname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - ${{ each proj in parameters.csproj }}:
      - task: ArtifactoryNuGet@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Nuget Restore: ${{ proj.cname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ proj.cPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - ${{ each sln in parameters.Solution }}:
      - task: ArtifactoryDotnetCore@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Dotnet Restore: ${{ sln.solutionname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          noNuGetCache: true
          rootPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - task: bleddynrichards.Assembly-Info-Task.Assembly-Info-Task.Assembly-Info-NetFramework@2
    displayName: ' File Versioning '
    inputs:
      FileNames: | 
       **\AssemblyInfo.cs
      Title: ${{ parameters.ComponentName }}
      Product: ${{ parameters.ComponentName }}
      Company: Philips
      VersionNumber: 1.0.0.0
      FileVersionNumber: 1.0.0.0
      InformationalVersion: 1.0.0.0'
      Copyright: 2023
    enabled: 'True'

  # - task: CopyFiles@2
  #   displayName: 'Copy File Directory.Build.props'
  #   inputs:
  #    SourceFolder: '$(build.sourcesdirectory)\Build\CI\Pipeline_Scripts\'
  #    Contents: Directory.Build.props
  #    TargetFolder: '$(build.sourcesdirectory)'
  #    OverWrite: true
  #    continueOnError: true

  - task: MSBuild@1
    displayName: 'Build solution: ${{ parameters.ComponentName }}Inf.sln'
    condition: and(succeeded(), eq(variables['custom_build'], ''))
    inputs:
     solution: ExtInf/$(SolutionPath)
     msbuildLocationMethod: location
     msbuildLocation: 'C:\Program Files\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe'
     platform: $(platform)
     configuration: $(configuration)
     clean: false
    enabled: 'true'

  - task: MSBuild@1
    displayName: 'Build solution: ${{ parameters.ComponentName }}Impl.sln'
    condition: and(succeeded(), eq(variables['custom_build'], ''))
    inputs:
     solution: Src/$(SolutionPath)
     msbuildLocationMethod: location
     msbuildLocation: 'C:\Program Files\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe'
     platform: $(platform)
     configuration: $(configuration)
     clean: false
    enabled: 'true'

  - task: PowerShell@2
    displayName: "Custom Build"
    name: "custom_build"
    condition: ne(variables['custom_build'], '')
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Triggering custom build: $env:CUSTOM_BUILD"
        $scriptPath = "$env:BUILD_SOURCESDIRECTORY\$env:CUSTOM_BUILD"
        Invoke-Expression $scriptPath
      failOnStderr: true
      workingDirectory: "$(Build.SourcesDirectory)"

#  - powershell: |
#      Write-Host "$(Build.SourcesDirectory)"
#    displayName: 'PowerShell Script'

  - script: |
      "$(Build.SourcesDirectory)\Tools\Tools.1.0.0\CyclomaticComplexity\Metrics\Release\net472\Metrics.exe" /s:"$(Build.SourcesDirectory)\ExtInf\$(ApplicationVersion)Inf.sln" /out:$(build.artifactstagingdirectory)\CyclomaticComplexity\Generated\$(ApplicationVersion)Inf.xml
    failOnStderr: true
    displayName: 'Create Cyclomatic files for $(ApplicationVersion)Inf.sln'

  - script: |
      "$(Build.SourcesDirectory)\Tools\Tools.1.0.0\CyclomaticComplexity\Metrics\Release\net472\Metrics.exe" /s:"$(Build.SourcesDirectory)\Src\$(ApplicationVersion)Impl.sln" /out:$(build.artifactstagingdirectory)\CyclomaticComplexity\Generated\$(ApplicationVersion)Impl.xml
    failOnStderr: true
    displayName: 'Create Cyclomatic files for $(ApplicationVersion)Impl.sln'
    condition: succeededOrFailed()