parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []


jobs:
- job: Third_Party_Ref_Check
  condition: and(succeeded(), eq(variables['3rdPartyRefCheck'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: PowerShell@2
    inputs:
      filePath: '$(PRfilepath)'
      arguments: '$(System.PullRequest.PullRequestId) "$(ReposID)" "$(ProjectURL)" $(build.sourcesdirectory) $(pat)'
    displayName: 'PRFiles'

  - task: PowerShell@2
    displayName: 'Gate: for 3rd party reference path'
    inputs:
     targetType: filePath
     filePath: '$(ThirdPartyRefCheck)'
     arguments: '$(build.sourcesdirectory) $(System.PullRequest.PullRequestId)'
    enabled: 'true'
