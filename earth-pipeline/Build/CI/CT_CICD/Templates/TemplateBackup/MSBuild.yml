parameters:  
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Version: ''
  csproj: []

jobs:
- job: MSBuild  
  dependsOn: ${{ parameters.dependsOn }}
  variables:
    DotNet_sln: $[ dependencies.Enable_Disable_Jobs.outputs['DotNet_Value.DotNet_sln'] ]    
  condition: and(succeeded(), eq(variables['MS_Build'], 'true'))
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none

  - task: ArtifactoryNuGet@1
    condition: eq(variables['DotNet_sln'], 'true')
    inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: '$(solutionPath)'
          packagesDirectory: '$(3rdPartyPackagesPath)'
    displayName: 'Package Restore' 

  - ${{ each proj in parameters.csproj }}:
      - task: ArtifactoryNuGet@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Nuget Restore: ${{ proj.cname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ proj.cPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - ${{ each sln in parameters.Solution }}:
      - task: ArtifactoryDotnetCore@1
        condition: and(succeeded(),eq(variables['dotnetcore'],True))
        displayName: 'Dotnet Restore: ${{ sln.solutionname }}'
        inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          noNuGetCache: true
          rootPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'
        enabled: 'true'

  - task: bleddynrichards.Assembly-Info-Task.Assembly-Info-Task.Assembly-Info-NetFramework@2
    condition: eq(variables['DotNet_sln'], 'true')
    displayName: ' File Versioning '
    inputs:
      FileNames: | 
       **\AssemblyInfo.cs
      Title: $(ComponentName)
      Product: $(ComponentName)
      Company: Philips
      VersionNumber: 1.0.0.0
      FileVersionNumber: 1.0.0.0
      InformationalVersion: 1.0.0.0'
      Copyright: 2021
    enabled: 'True'

  - task: MSBuild@1
    displayName: 'Build solution: $(ComponentName)'    
    condition: eq(variables['DotNet_sln'], 'true')
    inputs:
      solution: $(SolutionPath) 
      msbuildLocationMethod: 'location'
      msbuildLocation: $(msbuildLocation)
      configuration: $(configuration)
      clean: true                
