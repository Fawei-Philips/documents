parameters:
  Capabilityname: []
  agentDemand: []

jobs:
  - job: isMainOrDev
    displayName: Check Branch
    pool:
      name: "$(PoolName)"
      demands:
        - ${{ 'TFSAgentPool' }} -equals ${{ 'MainConsole_Hawk641' }}
    steps:
      - checkout: self
        submodules: true
        clean: true
      - task: PowerShell@2
        name: is_main_branch
        displayName: "Check: is branch main"
        inputs:
          filePath: "Build/CI/CT_CICD/Version_Automation/is_main_branch.ps1"
          arguments: '-Repo "$(Build.Repository.Name)" -Branch "$(Build.SourceBranchName)"'
      - task: PowerShell@2
        displayName: "Result: is branch main"
        inputs:
          targetType: "inline"
          script: 'Write-Host "isMain- $(is_main_branch.isMain)"'
  - job: updateVersion
    displayName: Update versions
    dependsOn: isMainOrDev
    condition: eq(dependencies.isMainOrDev.outputs['is_main_branch.isMain'], 1)
    pool:
      name: "$(PoolName)"
      demands:
        - ${{ 'TFSAgentPool' }} -equals ${{ 'MainConsole_Hawk641' }}
    steps:
      - checkout: self
        submodules: true
        clean: true
      - task: PowerShell@2
        name: bump_version
        displayName: Bump Versions
        inputs:
          filePath: "Build/CI/CT_CICD/Version_Automation/bump_version.ps1"
          arguments: '-Auth "$(PAT_ing07471)" -BaseRepoPath "$(Build.SourcesDirectory)" -Repo "$(Build.Repository.Name)" -Branch "$(Build.SourceBranchName)" -Prefix "$(Build.Repository.Name)"'
          failOnStderr: true
  - job: mergeVersion
    displayName: Create and merge PR
    dependsOn: updateVersion
    variables:
      newVersion: $[dependencies.updateVersion.outputs['bump_version.Version']]
    pool:
      name: "$(PoolName)"
      demands:
        - ${{ 'TFSAgentPool' }} -equals ${{ 'MainConsole_Hawk641' }}
    steps:
      - checkout: self
        submodules: true
        clean: true
      - task: PowerShell@2
        continueOnError: False
        displayName: Create and merge PR
        inputs:
          filePath: '$(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\create_merge_pr.ps1'
          arguments: '-Region "TPC_Region26" -Project "CT-GlobalSW" -Repo "$(Build.Repository.Name)" -Source "automatic-version-bump" -Target "$(Build.SourceBranchName)" -Title "Update changes" -Auth "$(PAT_ing07471)"'
          failOnStderr: true
      - powershell: |
          Write-Host $(newVersion)
          git pull origin $(Build.SourceBranchName)
          git tag $(newVersion)
          git push origin $(newVersion)
        displayName: Create Tag
