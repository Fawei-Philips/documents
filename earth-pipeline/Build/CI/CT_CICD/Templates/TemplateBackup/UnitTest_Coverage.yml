parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
jobs:
- job: UnitTest_Coverage
  condition: and(succeeded(), eq(variables['UnitTest_Coverage'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: CmdLine@2
    displayName: UnitTest_Coverage
    inputs:
     script: 'echo UnitTest_Coverage check'