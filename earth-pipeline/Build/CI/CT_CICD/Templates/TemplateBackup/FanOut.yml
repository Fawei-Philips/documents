parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []

jobs:
- job: FanOut
  condition: and(succeeded(), eq(variables['FanOut'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: CmdLine@2
    displayName: FanOut_TICS
    inputs:
     script: 'echo FanOut_TICS'