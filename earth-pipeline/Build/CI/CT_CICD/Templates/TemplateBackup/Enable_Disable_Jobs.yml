parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  slnpath: []

jobs:
- job: Enable_Disable_Jobs
  dependsOn: ${{ parameters.dependsOn }}
  condition: and(succeeded(), eq(variables['Enable_Disable'], 'true'))
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
  steps:
  - checkout: none
  - task: PowerShell@2
    inputs:
      filePath: Build/Pipeline_Scripts/PullrequestFiles.ps1   
      arguments: '$(System.PullRequest.PullRequestId) "$(ReposID)" "$(ProjectURL)" $(build.sourcesdirectory) '
    displayName: 'PR_files'
    enabled: false 
    
  - task: PowerShell@2    
    inputs:
      filePath: Build/Pipeline_Scripts/SetVariables.ps1   
      arguments: '$(build.sourcesdirectory) $(System.PullRequest.PullRequestId) "$(DotNet_sln_Path)" "$(Angular_sln_Path)" "$(Build_Folder_Path)"'
    displayName: 'Enabling and disabling tasks'

  - task: PowerShell@2
    continueOnError: true
    inputs:
     targetType: 'inline'
     script: |
        Write-Host "##vso[task.setvariable variable=DotNet_sln;isOutput=true]$(DotNet)"
        Write-Host "DotNet value $(DotNet)"
    name: DotNet_Value 

  - task: PowerShell@2
    continueOnError: true
    inputs:
     targetType: 'inline'
     script: |
        Write-Host "##vso[task.setvariable variable=Angular_sln;isOutput=true]$(Angular)"
        Write-Host "Angular value $(Angular)"
    name: Angular_Value
      
         