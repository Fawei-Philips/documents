parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Checkout: []

jobs:
- job: Fortify_Integration
  variables:
    INF : $[ stageDependencies.Build.Build.outputs['CheckSolutions.INF'] ]
    IMPL : $[ stageDependencies.Build.Build.outputs['CheckSolutions.IMPL'] ]
  workspace:
    clean: all
  timeoutInMinutes: 0
  condition: and(succeeded(), eq(variables['Fortify'], 'true'))
  dependsOn: ${{ parameters.dependsOn }}
  pool:
    name:  '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}

  steps:
  - checkout: self
    clean: true
    submodules: true
    condition: and(succeeded(), eq(variables['GitDownloadMethod'], ''))

  - checkout: self
    clean: true
    submodules: true
    condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Clone'))

  - checkout: none
    clean: true
    condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))

  - powershell: |
      Write-Host "Src: $(ADS_Backup_Repo_Path)\$(internal_folder_name)\*"
      Write-Host "Dest: $(Build.Repository.LocalPath)\"
      Copy-Item -Path "$(ADS_Backup_Repo_Path)\$(internal_folder_name)\*" -Destination "$(Build.Repository.LocalPath)\" -Recurse -Force
      Set-Location "$(Build.Repository.LocalPath)"

      if ($env:BUILD_SOURCEBRANCH -match '^refs/heads/(.*)$') {

        $branch = $matches[1]
        Write-Host "branch name: $branch"
        git reset --hard
        git checkout $branch
        git clean -xdf
        git fetch origin $branch
        git reset --hard origin/$branch
        git submodule update --init --recursive
      }
      elseif ($env:BUILD_SOURCEBRANCH -match '^refs/tags/(.*)$') {

        $tagName = $matches[1]
        Write-Host "Tag name: $tagName"
        $branch = "main"
        Write-Host "default branch name: $branch"
        $branch = "main"
        git reset --hard
        git checkout $branch
        git clean -xdf
        git fetch origin $branch
        git reset --hard origin/$branch
        git rest --hard $tagName
        git submodule update --init --recursive

      }else {
        $branch = "main"
        Write-Host "default branch name: $branch"
        $branch = "main"
        git reset --hard
        git checkout $branch
        git clean -xdf
        git fetch origin $branch
        git reset --hard origin/$branch
        git submodule update --init --recursive
      }
    displayName: 'Copy code from shared path and git pull'
    condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))

  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools_Dev'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools_Dev/Tools_Dev.$(Tools_Dev_version).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools_Dev -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools_Dev'
    failOnStderr: true
    
  - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
    displayName: 'Download Tools'
    inputs:
      connection: JfrogArtifactory
      fileSpec: |
       {
         "files": [
           {
             "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
             "target": "$(Build.SourcesDirectory)/",
             "flat": "true"
           }
         ]
       }
    enabled: true

  - script: 'nuget install Tools -Source %cd% -OutputDirectory Tools'
    workingDirectory: '$(Build.SourcesDirectory)'
    displayName: 'Install Tools'
    failOnStderr: true

  - ${{ each sln in parameters.Solution }}:
    - task: ArtifactoryNuGet@1
      displayName: 'Restore: ${{ sln.solutionname }}'
      inputs:
          command: 'restore'
          artifactoryService: '$(artifactoryService)'
          targetResolveRepo: '$(ArtifactoryRepoName)'
          solutionPath: ${{ sln.solutionPath }}
          packagesDirectory: '$(3rdPartyPackagesPath)'      
      enabled: 'true'  

  - script: |
      echo :INF: $(INF)
      echo :IMPL: $(IMPL)
    displayName: 'Check INF and IMPL Values' 

  - script: 'mkdir $(build.artifactstagingdirectory)\Fortify'
    displayName: 'Create Fortify output folder'
##  - ${{ each sv in parameters.SolutionPathAndVersionName }}:
  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Inf -clean'
    condition: and(succeeded(), eq(variables.INF,1))
    displayName: 'Clean Fortify Runs for $(ApplicationVersion)Inf'
  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Inf "$(MSBuildEngine)" $(Build.Repository.LocalPath)\ExtInf\$(ApplicationVersion)Inf.sln /t:rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:TreatWarningsAsErrors="false"'
    condition: and(succeeded(), eq(variables.INF,1))
    displayName: 'Fortify Translation for $(ApplicationVersion)Inf'
  
  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Inf "-Xmx4960m" "-Xss32M" -scan -f $(build.artifactstagingdirectory)\Fortify\$(ApplicationVersion)Inf_$(Build.BuildID).fpr'
    condition: and(succeeded(), eq(variables.INF,1))
    displayName: 'Fortify Analysis for $(ApplicationVersion)Inf'
  - script: '"$(FortifyInstallPath)\fortifyclient.bat" -url $(FortifyURL) -authtoken $(FortifyAuthToken) uploadFPR -f $(build.artifactstagingdirectory)\Fortify\$(ApplicationVersion)Inf_$(Build.BuildID).fpr -project $(FortifyProject) -version $(ApplicationVersion)'
    condition: and(succeeded(), eq(variables.INF,1))
    displayName: 'Fortify Upload for $(ApplicationVersion)Inf'

  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Impl  -clean'
    condition: and(succeeded(), eq(variables.IMPL,1))
    displayName: 'Clean Fortify Runs for $(ApplicationVersion)Impl'
  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Impl "$(MSBuildEngine)" $(Build.Repository.LocalPath)\Src\$(ApplicationVersion)Impl.sln /t:rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:TreatWarningsAsErrors="false"'
    condition: and(succeeded(), eq(variables.IMPL,1))
    displayName: 'Fortify Translation for $(ApplicationVersion)Impl'
  # - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Impl "-Xmx123411345408" "-Xss16M" -scan -f $(build.artifactstagingdirectory)\Fortify\$(ApplicationVersion)Impl_$(Build.BuildID).fpr'
  - script: '"$(FortifyInstallPath)\sourceanalyzer.exe" -b $(ApplicationVersion)Impl "-Xmx4960m" "-Xss32M" -scan -f $(build.artifactstagingdirectory)\Fortify\$(ApplicationVersion)Impl_$(Build.BuildID).fpr'
    condition: and(succeeded(), eq(variables.IMPL,1))
    displayName: 'Fortify Analysis for $(ApplicationVersion)Impl'
  - script: '"$(FortifyInstallPath)\fortifyclient.bat" -url $(FortifyURL) -authtoken $(FortifyAuthToken) uploadFPR -f $(build.artifactstagingdirectory)\Fortify\$(ApplicationVersion)Impl_$(Build.BuildID).fpr -project $(FortifyProject) -version $(ApplicationVersion)'
    condition: and(succeeded(), eq(variables.IMPL,1))
    displayName: 'Fortify Upload for $(ApplicationVersion)Impl'
  
  - script: 'dotnet $(Build.SourcesDirectory)\Tools\Tools.$(Toolsversion)\EGS\gates_main.dll -nightly $(Build.SourcesDirectory)\Build\CI\EGSconfigs\conf\sample-configuration-nightly\nightlyConfig.json -biu $(EGSbiu) -program $(EGSprogram) -n $(EGSprojectname) -w $(Build.SourcesDirectory) -gateon fortify -repotoken $(EGSToken)'
    displayName: 'EGS FORTIFY Integration GATE'
    failOnStderr: true

  - task: CdiscountAlm.rest-call-build-task.custom-build-task.restCallBuildTask@0
    inputs:
      webserviceEndpoint: RESTAPI
      httpVerb: 'POST'
      body: |
          {
          "_id":"$(Build.BuildNumber)",
          "_BuildName":"$(Build.DefinitionName)",
          "_PipelineType":"$(Build.DefinitionName)",
          "_RequestedBy":"$(Build.QueuedBy)",
          "_RequestedOn":null,
          "_QueuedAt":null,
          "_StartedAt":null,
          "_SourceVersion":"$(Build.SourceVersion)",
          "_OverallSummary":"https://tfsemea1.ta.philips.com/tfs/TPC_Region26/CT-GlobalSW/_build/index?buildId=$(Build.BuildID)&_a=summary",
          "_DevelopersContributed":["Null", "Null"],
          "_WhoFailed":["$(Build.QueuedBy)", "Null"],
                         "_AgentInfo":{
                                   "_AgentId":"$(Agent.Id)",
                                   "_AgentName":"$(Agent.Name)",
                                   "_AgentMachineName":"$(Agent.MachineName)",
                                   "_Status":"Active",
                                   "_ServiceAccount":"code1/cnhsherdb1-sys4",
                                   "_QueErr_Info":"null"
                         },
                         "_Steps":{
                                 "_SequenceId":null,
                                 "_StepName":null,
                                 "_Status":null,
                                 "_BriefInfo":null,
                                 "_StepDetailedInfo":{
                                 }
                         }
          }
      saveResponseToFile: true
      outputFilePath: '$(Build.ArtifactStagingDirectory)\apioutini.txt'
    condition: false


  - task: PowerShell@2
    displayName: 'Copy cleanup script to temp'
    inputs:
      targetType: inline
      script: |
          Copy-Item "$(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\workspace_cleanup.ps1" "$(Agent.TempDirectory)\workspace_cleanup.ps1"
          Copy-Item "$(Build.SourcesDirectory)\Build\CI\CT_CICD\Config\excluded_folders.txt" "$(Agent.TempDirectory)\excluded_folders.txt"
    condition: always()

  - task: PowerShell@2
    displayName: 'Cleanup Logs folder'
    inputs:
      targetType: filePath
      filePath: $(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\clean_up.ps1
      arguments:  'D:\Logs'
      failOnStderr: true
      workingDirectory: $(Build.SourcesDirectory)

  - task: PowerShell@2
    displayName: 'Work Space Cleanup'
    inputs:
      targetType: filePath
      filePath: $(Agent.TempDirectory)\workspace_cleanup.ps1
      arguments:  '-Paths "$(Agent.BuildDirectory)"'
      failOnStderr: true
      workingDirectory: $(Agent.TempDirectory)
    condition: always()

  - task: PowerShell@2
    displayName: 'D Drive Cleanup'
    inputs:
      targetType: filePath
      filePath: $(Agent.TempDirectory)\workspace_cleanup.ps1
      arguments: '-CleanDDrive $true'
      failOnStderr: true
      workingDirectory: $(Agent.TempDirectory)