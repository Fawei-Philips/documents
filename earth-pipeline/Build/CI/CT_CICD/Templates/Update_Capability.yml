parameters:
  Capabilityname: []
  agentDemand: []

jobs:
- job: Update_Capability
  timeoutInMinutes: 420
  condition: and(succeeded(), eq(variables['Update_Capability'], 'true'))
  pool:
    name: '$(PoolName)'
    demands:
    - ${{ parameters.agentDemand }} -equals $(DemandValue1)
  steps:
  - task: PowerShell@2
    timeoutInMinutes: 0
    inputs:
        filePath: $(UpdateCapability)
        arguments: $(PoolID) $(Agent.Id) "$(ADSURL)" "$(Build.BuildId)" "$(TFS_PAT)" ${{ parameters.agentDemand }}