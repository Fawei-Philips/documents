parameters: 
  agentcapability: []
  agentDemand: []
  Version: ''
  ComponentName: ''
  TargetTestFolder: ''
  DebugMode: 'true'
  RunModuleTest : 'false'
  Publish: 'false'


stages:
  - stage: Update_Capability
    displayName: "Update Capability"
    dependsOn: []
    jobs:
      - template: Update_Capability.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}

  - stage: Update_Version
    displayName: "Check & Update Version"
    dependsOn: ["Update_Capability"]
    jobs:
      - template: Auto_Versioning_Inf.yml

  - stage: Build
    displayName: "Build"
    dependsOn: ["Update_Version"]
    jobs:
      - template: Build_Nightly_Versioning.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'

  - stage: CT_Fortify_Nightly
    displayName: "Fortify"
    dependsOn: ["Build"]
    jobs:
      - template: CT_Fortify_Nightly1.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self

  - stage: CT_Resharper_Nightly
    displayName: "Resharper"
    dependsOn: ["Build"]
    jobs:
      - template: CT_Resharper_Nightly.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self

  - stage: CT_Project_Settings_Nightly
    displayName: "Project_Settings"
    dependsOn: ["Build"]
    jobs:
      - template: CT_Project_Settings_Nightly1.yml
        parameters:
          timeoutInMinutes: 0
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self

  - stage: CT_Blackduck_Nightly
    displayName: "Blackduck"
    dependsOn: ["Build"]
    jobs:
      - template: CT_Blackduck_Nightly1.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self

  
  - stage: Create_Verify_Update
    displayName: "Verify Create & Upload Nugets"
    dependsOn:
      - Update_Version
      - CT_Blackduck_Nightly
      - CT_Fortify_Nightly
      - CT_Project_Settings_Nightly
      - CT_Resharper_Nightly
      - CT_Tics_Nightly
    condition: eq(stageDependencies.Update_Version.outputs['isMainOrDev.is_main_branch.isMain'], 1)
    jobs:
      - ${{ if eq(parameters.Publish, 'true') }}:
        - template: Verify_Create_Upload_Nuget_Versioning.yml
          parameters:
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
            Checkout: self
      - ${{ if eq(parameters.DebugMode, 'true') }}:
        - template: Verify_Create_Upload_Nuget_Debug.yml
          parameters:
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
            Checkout: self 


  - ${{ if eq(parameters.RunModuleTest, 'true') }}:
    - stage: BuildandModuleNunit
      displayName: "Build And Module Nunit"      
      dependsOn: ["Update_Capability"]
      jobs:
        - template: Module_Nunit_Nightly.yml
          parameters:
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            TargetTestFolder: ${{ parameters.TargetTestFolder }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
  
    - stage: CT_Tics_Nightly
      displayName: "Tics"
      dependsOn: ["BuildandModuleNunit"]
      jobs:
        - template: CT_TICS_Nightly1.yml
          parameters:
            timeoutInMinutes: 0
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
            Checkout: self
  
  - ${{ if eq(parameters.RunModuleTest, 'false') }}:
    - stage: BuildandNunit
      displayName: "Build And Nunit"
      dependsOn: ["Update_Capability"]
      jobs:
        - template: Nunit_Nightly.yml
          parameters:
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            TargetTestFolder: ${{ parameters.TargetTestFolder }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
    - stage: CT_Tics_Nightly
      displayName: "Tics"
      dependsOn: ["BuildandNunit"]
      jobs:
        - template: CT_TICS_Nightly1.yml
          parameters:
            timeoutInMinutes: 0
            agentcapability: ${{ parameters.agentcapability }}
            agentDemand: ${{ parameters.agentDemand }}
            Version: ${{ parameters.Version }}
            ComponentName: ${{ parameters.ComponentName }}
            Solution:
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
              - solutionname: ${{ parameters.ComponentName }}
                solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'

  - stage: Create_Verify_Update_Dev
    displayName: "Verify Create & Upload Dev Nugets"
    dependsOn:
      - Update_Version
      - CT_Blackduck_Nightly
      - CT_Fortify_Nightly
      - CT_Project_Settings_Nightly
      - CT_Resharper_Nightly
      - CT_Tics_Nightly
    condition: eq(stageDependencies.Update_Version.outputs['isMainOrDev.is_main_branch.isMain'], 0)
    jobs:
      - template: Verify_Dev_Create_Upload_Nuget1.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Publish: ${{ parameters.Publish }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self
      - ${{ if eq(parameters.DebugMode, 'true') }}:
          - template: Verify_Dev_Create_Upload_Nuget_Debug.yml
            parameters:
              agentcapability: ${{ parameters.agentcapability }}
              agentDemand: ${{ parameters.agentDemand }}
              Version: ${{ parameters.Version }}
              ComponentName: ${{ parameters.ComponentName }}
              Solution:
                - solutionname: ${{ parameters.ComponentName }}
                  solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
                - solutionname: ${{ parameters.ComponentName }}
                  solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
              Checkout: self