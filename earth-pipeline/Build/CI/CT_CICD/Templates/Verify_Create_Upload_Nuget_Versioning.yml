parameters:
  dependsOn: []
  agentcapability: []
  agentDemand: []
  Version: ""
  ComponentName: ""
  Solution: []
  csproj: []


jobs:
  - job: Verify_create_upload_nuget
    displayName: "Verify Create Upload"
    timeoutInMinutes: 0
    variables:
      newVersion: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.Version'] ]
      finalVersion: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.FinalVersion'] ]
      InfVersion: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.InfVersion'] ]
    dependsOn: ${{ parameters.dependsOn }}
    pool:
      name: "$(PoolName)"
      demands:
        - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
    steps:
      - checkout: self
        clean: true
        submodules: true
        condition: and(succeeded(), eq(variables['GitDownloadMethod'], ''))

      - checkout: self
        clean: true
        submodules: true
        condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Clone'))

      - checkout: none
        clean: true
        condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))

      - powershell: |
          Write-Host "Src: $(ADS_Backup_Repo_Path)\$(internal_folder_name)\*"
          Write-Host "Dest: $(Build.Repository.LocalPath)\"
          Copy-Item -Path "$(ADS_Backup_Repo_Path)\$(internal_folder_name)\*" -Destination "$(Build.Repository.LocalPath)\" -Recurse -Force
          Set-Location "$(Build.Repository.LocalPath)"       
          git reset --hard
          git checkout main
          git clean -xdf
          git fetch origin main
          git reset --hard origin/main
          git submodule update --init --recursive
        displayName: 'Copy code from shared path and git pull'
        condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))

      - powershell: |
          Write-Host "Final Version: $(FinalVersion)"
          git reset --hard
          git checkout main
          git clean -xdf
          git fetch origin main
          git reset --hard origin/main
          git fetch origin --tags
          git checkout $(newVersion)
          git submodule update --init --recursive
          git submodule update --remote --merge
          git submodule status
        displayName: "Checkout New Version"

      - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
        displayName: 'Download Tools_Dev'
        inputs:
          connection: JfrogArtifactory
          fileSpec: |
           {
             "files": [
               {
                 "pattern": "ct-workspace/Tools_Dev/Tools_Dev.$(Tools_Dev_version).nupkg",
                 "target": "$(Build.SourcesDirectory)/",
                 "flat": "true"
               }
             ]
           }
        enabled: true

      - script: 'nuget install Tools_Dev -Source %cd% -OutputDirectory Tools'
        workingDirectory: '$(Build.SourcesDirectory)'
        displayName: 'Install Tools_Dev'
        failOnStderr: true
      - task: JFrog.jfrog-artifactory-vsts-extension.artifactory-generic-download.ArtifactoryGenericDownload@3
        displayName: "Download Tools"
        inputs:
          connection: JfrogArtifactory
          fileSpec: |
            {
              "files": [
                {
                  "pattern": "ct-workspace/Tools/Tools.$(Toolsversion).nupkg",
                  "target": "$(Build.SourcesDirectory)/",
                  "flat": "true"
                }
              ]
            }
        enabled: true

      - script: "nuget install Tools -Source %cd% -OutputDirectory Tools"
        workingDirectory: "$(Build.SourcesDirectory)"
        displayName: "Install Tools"
        failOnStderr: true

      - ${{ each sln in parameters.Solution }}:
          - task: ArtifactoryNuGet@1
            condition: and(succeeded(),eq(variables['dotnetcore'],''))
            displayName: "Restore: ${{ sln.solutionname }}"
            inputs:
              command: "restore"
              artifactoryService: "$(artifactoryService)"
              targetResolveRepo: "$(ArtifactoryRepoName)"
              solutionPath: ${{ sln.solutionPath }}
              packagesDirectory: "$(3rdPartyPackagesPath)"
            enabled: "true"

      - ${{ each proj in parameters.csproj }}:
          - task: ArtifactoryNuGet@1
            condition: and(succeeded(),eq(variables['dotnetcore'],True))
            displayName: 'Nuget Restore: ${{ proj.cname }}'
            inputs:
              command: 'restore'
              artifactoryService: '$(artifactoryService)'
              targetResolveRepo: '$(ArtifactoryRepoName)'
              solutionPath: ${{ proj.cPath }}
              packagesDirectory: '$(3rdPartyPackagesPath)'
            enabled: 'true'

      - ${{ each sln in parameters.Solution }}:
          - task: ArtifactoryDotnetCore@1
            condition: and(succeeded(),eq(variables['dotnetcore'],True))
            displayName: 'Dotnet Restore: ${{ sln.solutionname }}'
            inputs:
              command: 'restore'
              artifactoryService: '$(artifactoryService)'
              targetResolveRepo: '$(ArtifactoryRepoName)'
              noNuGetCache: true
              rootPath: ${{ sln.solutionPath }}
              packagesDirectory: '$(3rdPartyPackagesPath)'
            enabled: 'true'

      - task: bleddynrichards.Assembly-Info-Task.Assembly-Info-Task.Assembly-Info-NetFramework@2
        displayName: " File Versioning "
        inputs:
          FileNames: |
            **\AssemblyInfo.cs
          Title: ${{ parameters.ComponentName }}
          Product: ${{ parameters.ComponentName }}
          Company: Philips
          VersionNumber: 1.0.0.0
          FileVersionNumber: 1.0.0.0
          InformationalVersion: 1.0.0.0'
          Copyright: 2023
        enabled: "True"

      - task: MSBuild@1
        displayName: "Build solution: ${{ parameters.ComponentName }}Inf.sln"
        condition: and(succeeded(), eq(variables['custom_build'], ''))
        inputs:
          solution: ExtInf/$(SolutionPath)
          msbuildLocationMethod: location
          msbuildLocation: '$(MSBuildEngine)'
          platform: $(platform)
          configuration: $(configuration)
          clean: false
        enabled: "true"

      - task: MSBuild@1
        displayName: "Build solution: ${{ parameters.ComponentName }}Impl.sln"
        condition: and(succeeded(), eq(variables['custom_build'], ''))
        inputs:
          solution: Src/$(SolutionPath)
          msbuildLocationMethod: location
          msbuildLocation: '$(MSBuildEngine)'
          platform: $(platform)
          configuration: $(configuration)
          clean: false
        enabled: "true"

      - task: PowerShell@2
        displayName: "Custom Build"
        name: "custom_build"
        condition: ne(variables['custom_build'], '')
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "Triggering custom build: $env:CUSTOM_BUILD"
            $scriptPath = "$env:BUILD_SOURCESDIRECTORY\$env:CUSTOM_BUILD"
            Invoke-Expression $scriptPath
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)"
      
      - task: PowerShell@2
        displayName: "Sign File List"
        inputs:
          targetType: filePath
          filePath: "./Build/CI/CT_CICD/WixScript/BatchSignFileList.ps1"
          arguments: "$(Build.SourcesDirectory)"
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"
      
      - task: PowerShell@2
        displayName: "Delete nuget package from Artifactory"
        inputs:
          targetType: 'inline'
          script: |
            $uri = "$(artifactory_base_url)/$(artifactory_reponame)/$(internal_folder_name)/$(state)/$(component_name).$(InfVersion).nupkg"
            $headers = @{
                "X-JFrog-Art-Api" = "$(artifactory_access_token)"
            }
            try {
              Invoke-RestMethod -Uri $uri -Method Delete -Headers $headers
              Write-Host "remove nuget package : $(component_name).$(InfVersion).nupkg successfully."
              } catch {

                if ($_.Exception.Response.StatusCode.value__ -eq 404) {
                    Write-Host "nuget package: $(component_name).$(InfVersion).nupkg does not exist."
                } else {
                    Write-Host "removed nuget package: $(component_name).$(InfVersion).nupkg error: $($_.Exception.Message)"
                }
            }            
        condition: succeeded()

      - task: PowerShell@2
        inputs:
          filePath: "$(nuspec_checker_script_path)"
          arguments: "$(validate_artifactory_base_url) $(artifactory_reponame) $(internal_folder_name) $(state) $(user_name) $(token) $(nuspec_source_path) $(component_name)"
        displayName: "Check: new version in nuspec"    


      - task: NuGetCommand@2
        displayName: "NuGet package creator"
        inputs:
          command: pack
          packagesToPack: "$(nuspec_source_path)"
          packDestination: "$(Build.ArtifactStagingDirectory)/$(state)"
          verbosityPack: Detailed
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        inputs:
          filePath: "$(nuget_uploader_script_path)"
          arguments: "$(upload_base_url) $(artifactory_reponame) $(internal_folder_name) $(state) $(user_name) $(token) $(nupkg_source_path) $(component_name)*.nupkg"
        displayName: "Upload: nuget package"
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        displayName: "Download: Inf nuget package"
        inputs:       
          targetType: filePath   
          filePath: "./Build/CI/CT_CICD/WixScript/DownloadFileFromArtifactory.ps1"
          arguments: "$(artifactory_base_url)/$(artifactory_reponame)/$(internal_folder_name)/$(component_name)/$(state).$(InfVersion).nupkg $(nupkg_source_path)/$(state).$(InfVersion).nupkg $(user_name) $(token)"
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"
        continueOnError: false        
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'false'))

      # Component2
      - task: PowerShell@2
        inputs:
          filePath: "$(nuspec_checker_script_path)"
          arguments: "$(validate_artifactory_base_url) $(artifactory_reponame) $(internal_folder_name) $(state2) $(user_name) $(token) $(nuspec_source_path2) $(component_name2)"
        displayName: "Check: new version in nuspec"

      - task: NuGetCommand@2
        displayName: "NuGet package creator"
        inputs:
          command: pack
          packagesToPack: "$(nuspec_source_path2)"
          packDestination: "$(Build.ArtifactStagingDirectory)/$(state2)"
          verbosityPack: Detailed
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        inputs:
          filePath: "$(nuget_uploader_script_path)"
          arguments: "$(upload_base_url) $(artifactory_reponame) $(internal_folder_name) $(state2) $(user_name) $(token) $(nupkg_source_path2) $(component_name2)*.nupkg"
        displayName: "Upload: nuget package"
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        displayName: "Download: Impl nuget package"
        inputs:       
          targetType: filePath   
          filePath: "./Build/CI/CT_CICD/WixScript/DownloadFileFromArtifactory.ps1"
          arguments: "$(artifactory_base_url)/$(artifactory_reponame)/$(internal_folder_name)/$(component_name2)/$(state2).$(finalVersion).nupkg $(nupkg_source_path2)/$(state2).$(finalVersion).nupkg $(user_name) $(token)"
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"
        continueOnError: false        
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'false'))

      # Component3
      - task: PowerShell@2
        inputs:
          filePath: "$(nuspec_checker_script_path)"
          arguments: "$(validate_artifactory_base_url) $(artifactory_reponame) $(internal_folder_name) $(state3) $(user_name) $(token) $(nuspec_source_path3) $(component_name3)"
        displayName: "Check: new version in nuspec"

      - task: NuGetCommand@2
        displayName: "NuGet package creator"
        inputs:
          command: pack
          packagesToPack: "$(nuspec_source_path3)"
          packDestination: "$(Build.ArtifactStagingDirectory)/$(state3)"
          verbosityPack: Detailed
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        inputs:
          filePath: "$(nuget_uploader_script_path)"
          arguments: "$(upload_base_url) $(artifactory_reponame) $(internal_folder_name) $(state3) $(user_name) $(token) $(nupkg_source_path3) $(component_name3)*.nupkg"
        displayName: "Upload: nuget package"
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))
      
      - task: PowerShell@2
        displayName: "Download: PostActions nuget package"
        inputs:       
          targetType: filePath   
          filePath: "./Build/CI/CT_CICD/WixScript/DownloadFileFromArtifactory.ps1"
          arguments: "$(artifactory_base_url)/$(artifactory_reponame)/$(internal_folder_name)/$(component_name3)/$(state3).$(finalVersion).nupkg $(nupkg_source_path3)/$(state3).$(finalVersion).nupkg $(user_name) $(token)"
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"
        continueOnError: false        
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'false'))

      # Component4
      - task: PowerShell@2
        inputs:
          filePath: "$(nuspec_checker_script_path)"
          arguments: "$(validate_artifactory_base_url) $(artifactory_reponame) $(internal_folder_name) $(state4) $(user_name) $(token) $(nuspec_source_path4) $(component_name4)"
        displayName: "Check: new version in nuspec"

      - task: NuGetCommand@2
        displayName: "NuGet package creator"
        inputs:
          command: pack
          packagesToPack: "$(nuspec_source_path4)"
          packDestination: "$(Build.ArtifactStagingDirectory)/$(state4)"
          verbosityPack: Detailed
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        inputs:
          filePath: "$(nuget_uploader_script_path)"
          arguments: "$(upload_base_url) $(artifactory_reponame) $(internal_folder_name) $(state4) $(user_name) $(token) $(nupkg_source_path4) $(component_name4)*.nupkg"
        displayName: "Upload: nuget package"
        continueOnError: false
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'true'))

      - task: PowerShell@2
        displayName: "Download: Test nuget package"
        inputs:       
          targetType: filePath   
          filePath: "./Build/CI/CT_CICD/WixScript/DownloadFileFromArtifactory.ps1"
          arguments: "$(artifactory_base_url)/$(artifactory_reponame)/$(internal_folder_name)/$(component_name4)/$(state4).$(finalVersion).nupkg $(nupkg_source_path4)/$(state4).$(finalVersion).nupkg $(user_name) $(token)"
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"
        continueOnError: false        
        condition: and(succeeded(), eq(variables['var.createnugetpackage'], 'false'))

      - task: PowerShell@2
        displayName: "Nuget Restore MSI"
        inputs:
          targetType: filePath
          filePath: "./Build/CI/CT_CICD/WixScript/Nuget_Restore_MSI.ps1"
          arguments: "$(Build.Repository.Name) $(finalVersion) $(InfVersion) $(Build.ArtifactStagingDirectory)"
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"

      - task: PowerShell@2
        displayName: "Wix Create MSI"
        inputs:
          targetType: filePath
          filePath: "./Build/CI/CT_CICD/WixScript/CreateMsi.ps1"
          arguments: "$(Build.Repository.Name) $(Build.SourcesDirectory) $(finalVersion) $(InfVersion) $(finalVersion)"
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"

      - task: PowerShell@2
        displayName: "Push MSI to Artifactory"
        inputs:
          targetType: filePath
          filePath: "./Build/CI/CT_CICD/WixScript/PushMsiToArtifactory.ps1"
          arguments: "$(artifactory_base_url) $(Build.SourcesDirectory) $(user_name):$(token) $(Build.Repository.Name) $(finalVersion)"
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/WixScript"

      - task: PowerShell@2
        displayName: "Cleanup folders"
        inputs:
          targetType: filePath
          filePath: "./Build/CI/CT_CICD/scripts/clean_up.ps1"
          arguments: "D:/$(Build.Repository.Name)_temp,D:/$(Build.Repository.Name)CommonMsiScriptFragmentFile"
          failOnStderr: true
          workingDirectory: "$(Build.SourcesDirectory)/Build/CI/CT_CICD/scripts"
        condition: always()

      - task: PowerShell@2
        displayName: 'Copy cleanup script to temp'
        inputs:
          targetType: inline
          script: |
              Copy-Item "$(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\workspace_cleanup.ps1" "$(Agent.TempDirectory)\workspace_cleanup.ps1"
              Copy-Item "$(Build.SourcesDirectory)\Build\CI\CT_CICD\Config\excluded_folders.txt" "$(Agent.TempDirectory)\excluded_folders.txt"
        condition: always()

      - task: PowerShell@2
        displayName: 'Cleanup Logs folder'
        inputs:
          targetType: filePath
          filePath: $(Build.SourcesDirectory)\Build\CI\CT_CICD\scripts\clean_up.ps1
          arguments:  'D:\Logs'
          failOnStderr: true
          workingDirectory: $(Build.SourcesDirectory)

      - task: PowerShell@2
        displayName: 'Work Space Cleanup'
        inputs:
          targetType: filePath
          filePath: $(Agent.TempDirectory)\workspace_cleanup.ps1
          arguments:  '-Paths "$(Agent.BuildDirectory)"'
          failOnStderr: true
          workingDirectory: $(Agent.TempDirectory)
        condition: always()

      - task: PowerShell@2
        displayName: 'D Drive Cleanup'
        inputs:
          targetType: filePath
          filePath: $(Agent.TempDirectory)\workspace_cleanup.ps1
          arguments: '-CleanDDrive $true'
          failOnStderr: true
          workingDirectory: $(Agent.TempDirectory)
