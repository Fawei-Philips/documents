parameters: 
  agentPool: []
  agentcapability: []
  agentDemand: []
  Version: ''
  ComponentName: ''


stages:
  - stage: Update_Version
    displayName: "Check & Update Version"
    jobs:
      - template: Auto_Versioning_Inf.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          IsProductBuild: 1
  - stage: Create_Verify_Update
    displayName: "Verify Create & Upload Nugets"
    dependsOn:
      - Update_Version
    condition: eq(stageDependencies.Update_Version.outputs['isMainOrDev.is_main_branch.isMain'], 1)
    jobs:
      - template: Verify_Create_Upload_Nuget_Versioning.yml
        parameters:
          agentcapability: ${{ parameters.agentcapability }}
          agentDemand: ${{ parameters.agentDemand }}
          Version: ${{ parameters.Version }}
          ComponentName: ${{ parameters.ComponentName }}
          Solution:
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'ExtInf/${{ parameters.ComponentName }}Inf.sln'
            - solutionname: ${{ parameters.ComponentName }}
              solutionPath: 'Src/${{ parameters.ComponentName }}Impl.sln'
          Checkout: self
  - stage: Update_CompReg
    displayName: "Update Component Registry"
    dependsOn:
      - Update_Version
      - Create_Verify_Update
    pool:
      name: ${{parameters.agentPool}}
      demands:
        - ${{ parameters.agentDemand }} -equals ${{ parameters.agentcapability }}
    jobs:
      - job: update_comp_reg
        displayName: "Update Component Registry"
        variables:
          infVersion: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.InfVersion'] ]
          implVersion: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.FinalVersion'] ]
          wasInfChanged: $[ stageDependencies.Update_Version.updateVersion.outputs['bump_version.WasInfChanged'] ]
        steps:
          - checkout: self
            submodules: true
            clean: true
            condition: and(succeeded(), eq(variables['GitDownloadMethod'], ''))

          - checkout: self
            submodules: true
            clean: true
            condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Clone'))

          - checkout: none
            clean: true
            condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))

          - powershell: |
              Write-Host "Src: $(ADS_Backup_Repo_Path)\$(internal_folder_name)\*"
              Write-Host "Dest: $(Build.Repository.LocalPath)\"
              Copy-Item -Path "$(ADS_Backup_Repo_Path)\$(internal_folder_name)\*" -Destination "$(Build.Repository.LocalPath)\" -Recurse -Force
              Set-Location "$(Build.Repository.LocalPath)"       
              $branch = "main"
              git reset --hard
              git checkout $branch
              git clean -xdf
              git fetch origin $branch
              git reset --hard origin/$branch
              git submodule update --init --recursive
            displayName: 'Copy code from shared path and git pull'
            condition: and(succeeded(), eq(variables['GitDownloadMethod'], 'Pull'))  


          - task: PowerShell@2
            inputs:
              filePath: '$(Build.SourcesDirectory)/Build/CI/CT_CICD/ProductBuild_Automation/UpdateCompRegistry.ps1'
              arguments: '-Auth $(TFS_AUTH) -repoPath "C:\TEMP" -branchName "update-product-build" -commitMessage "Earth product build and push ${{ parameters.ComponentName }}" -interfaceChanged $(wasInfChanged) -ImplVersion $(implVersion) -InfVersion "$(infVersion)" -mainBranch "master" -repoName ${{ parameters.ComponentName }}'
          - task: PostBuildCleanup@3
            displayName: 'Post-Build Cleanup'
            inputs:
              rootFolderOrFile: $directories.split('_')
              cleanSources: true
            condition: always()
